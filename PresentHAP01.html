<html lang="en">

<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --bg:#070b14; --bg2:#0a1020; --panel:#0e1626;
  --cyan:#2ee6d6; --cyan-dim:rgba(46,230,214,.14);
  --pink:#ff2e63; --gold:#e6b84c; --white:#f2f6fb; --grey:#8b98ad;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#04060c;font-family:'Kanit',sans-serif;color:var(--white);overflow:hidden}
#stage-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#04060c}
#stage{position:relative;width:min(100vw,177.78vh);height:min(100vh,56.25vw);background:radial-gradient(120% 140% at 70% -10%, #101a30 0%, var(--bg) 55%, #05070f 100%);overflow:hidden;box-shadow:0 0 120px rgba(46,230,214,.06)}
/* grid + glow ambience */
#stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(46,230,214,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(46,230,214,.05) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(80% 80% at 50% 40%,#000 30%,transparent 100%);pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35;pointer-events:none}
.orb.c{width:40%;height:40%;background:var(--cyan);top:-15%;right:-10%;animation:drift 14s ease-in-out infinite alternate}
.orb.p{width:35%;height:35%;background:var(--pink);bottom:-18%;left:-8%;animation:drift 17s ease-in-out infinite alternate-reverse;opacity:.22}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(4%,6%) scale(1.15)}}

/* ============ scenes ============ */
.scene{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4% 7% 12%;}
.scene.active{display:flex}
.kicker{font-family:'JetBrains Mono',monospace;letter-spacing:.35em;font-size:clamp(10px,1.3vw,16px);color:var(--cyan);text-transform:uppercase;margin-bottom:1.2em;animation:fadeUp .8s both}
.big{font-family:'Anton',sans-serif;font-size:clamp(30px,5.6vw,74px);line-height:1.08;letter-spacing:.02em;text-transform:uppercase;animation:fadeUp .9s .15s both}
.big .hl{color:var(--cyan);text-shadow:0 0 30px rgba(46,230,214,.55)}
.big .hp{color:var(--pink);text-shadow:0 0 30px rgba(255,46,99,.5)}
.sub{font-weight:300;font-size:clamp(13px,1.7vw,22px);color:var(--grey);margin-top:1.4em;max-width:70%;animation:fadeUp 1s .35s both}
.sub b{color:var(--white);font-weight:600}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes pop{0%{opacity:0;transform:scale(.7)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{text-shadow:0 0 24px rgba(46,230,214,.4)}50%{text-shadow:0 0 60px rgba(46,230,214,.95)}}

.chiprow{display:flex;gap:2.2%;margin-top:3em;justify-content:center;width:100%}
.chip{background:var(--panel);border:1px solid rgba(46,230,214,.25);border-radius:14px;padding:1.4em 1.6em;min-width:24%;animation:pop .7s both}
.chip:nth-child(2){animation-delay:.25s}.chip:nth-child(3){animation-delay:.5s}
.chip .n{font-family:'JetBrains Mono',monospace;color:var(--pink);font-size:clamp(10px,1vw,13px);letter-spacing:.25em}
.chip h3{font-size:clamp(14px,1.8vw,24px);font-weight:600;margin:.35em 0 .3em;color:var(--cyan)}
.chip p{font-weight:300;font-size:clamp(11px,1.25vw,16px);color:var(--grey);line-height:1.45}

.hero-banner{width:82%;border-radius:16px;border:1px solid rgba(46,230,214,.3);box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(46,230,214,.15);margin-bottom:2.4em;animation:pop .9s both}
.img-frame{border-radius:16px;overflow:hidden;border:1px solid rgba(46,230,214,.3);box-shadow:0 20px 60px rgba(0,0,0,.6)}

/* stat bars */
.bars{width:70%;margin-top:3em;text-align:left}
.bar-item{margin-bottom:2em}
.bar-item .lbl{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:clamp(11px,1.3vw,16px);margin-bottom:.5em;color:var(--grey)}
.bar-item .lbl .v{font-family:'Anton';font-size:clamp(18px,2.6vw,34px)}
.bar{height:clamp(14px,2vw,24px);background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;width:0;transition:width 2.2s cubic-bezier(.2,.8,.2,1)}
.b-ai i{background:linear-gradient(90deg,var(--pink),#ff7aa0);box-shadow:0 0 24px rgba(255,46,99,.6)}
.b-hu i{background:linear-gradient(90deg,var(--cyan),#8ef5ea);box-shadow:0 0 24px rgba(46,230,214,.6)}
.b-ai .v{color:var(--pink)}.b-hu .v{color:var(--cyan)}

/* vs split */
.vs{display:flex;width:92%;gap:3%;margin-top:2.6em;align-items:stretch}
.vs .side{flex:1;background:var(--panel);border-radius:18px;padding:2em 1.8em;text-align:left;animation:fadeUp .8s both}
.vs .side.right{animation-delay:.3s}
.vs .side h3{font-family:'Anton';font-size:clamp(16px,2.3vw,30px);letter-spacing:.03em;margin-bottom:.5em}
.vs .side ul{list-style:none;font-weight:300;font-size:clamp(11px,1.35vw,17px);color:var(--grey);line-height:1.8}
.vs .side ul li::before{content:"— ";color:inherit}
.vs .left{border:1px solid rgba(255,255,255,.12)}
.vs .left h3{color:var(--grey)}
.vs .right{border:1px solid rgba(46,230,214,.45);box-shadow:0 0 40px rgba(46,230,214,.12)}
.vs .right h3{color:var(--cyan)}
.vs-badge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Anton';background:var(--pink);color:#fff;border-radius:50%;width:clamp(44px,6vw,76px);height:clamp(44px,6vw,76px);display:flex;align-items:center;justify-content:center;font-size:clamp(14px,2vw,26px);box-shadow:0 0 40px rgba(255,46,99,.7);animation:pop .6s .5s both}

/* layers */
.layerno{font-family:'Anton';font-size:clamp(70px,13vw,170px);color:transparent;-webkit-text-stroke:2px rgba(46,230,214,.55);line-height:1;animation:pop .8s both}
.persona-row{display:flex;gap:2.5%;margin-top:2.2em;width:88%;justify-content:center}
.pcard{flex:1;background:var(--panel);border:1px solid rgba(46,230,214,.3);border-radius:18px;padding:1.5em 1em 1.3em;animation:pop .7s both}
.pcard:nth-child(2){animation-delay:.25s;border-color:rgba(255,46,99,.45)}
.pcard:nth-child(3){animation-delay:.5s}
.pcard img{width:clamp(64px,9vw,120px);height:clamp(64px,9vw,120px);object-fit:cover;border-radius:50%;border:3px solid var(--cyan);box-shadow:0 0 24px rgba(46,230,214,.4)}
.pcard:nth-child(2) img{border-color:var(--pink);box-shadow:0 0 24px rgba(255,46,99,.4)}
.pcard h3{font-size:clamp(15px,2vw,26px);font-weight:800;margin-top:.5em}
.pcard .tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:clamp(9px,1vw,13px);color:var(--cyan);border:1px solid rgba(46,230,214,.4);border-radius:99px;padding:.25em 1em;margin-top:.5em}
.pcard:nth-child(2) .tag{color:var(--pink);border-color:rgba(255,46,99,.4)}
.pcard p{font-weight:300;font-size:clamp(10px,1.15vw,14px);color:var(--grey);margin-top:.7em;line-height:1.5}

/* equation */
.eq{display:flex;align-items:center;gap:2.5%;margin-top:2.5em;justify-content:center;width:100%}
.eq .t{background:var(--panel);border:1px solid rgba(46,230,214,.3);border-radius:16px;padding:1.2em 1.6em;font-weight:600;font-size:clamp(13px,1.8vw,24px);animation:pop .6s both}
.eq .t:nth-child(3){animation-delay:.25s}.eq .t:nth-child(5){animation-delay:.5s}
.eq .op{font-family:'Anton';font-size:clamp(22px,3.4vw,46px);color:var(--pink);animation:pop .5s .6s both}
.eq .res{background:linear-gradient(135deg,rgba(46,230,214,.18),rgba(255,46,99,.14));border:1px solid var(--cyan);border-radius:16px;padding:1.2em 1.8em;font-family:'Anton';font-size:clamp(17px,2.6vw,36px);color:var(--cyan);text-shadow:0 0 24px rgba(46,230,214,.6);animation:pop .7s .85s both}

/* network dots */
.net{position:relative;width:clamp(180px,26vw,340px);height:clamp(180px,26vw,340px);margin-top:1.6em}
.net .hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18%;height:18%;background:var(--cyan);border-radius:50%;box-shadow:0 0 50px var(--cyan);animation:pulse 2s infinite}
.net .nd{position:absolute;width:7%;height:7%;background:rgba(255,255,255,.75);border-radius:50%;animation:pop .6s both}
.ring{position:absolute;inset:0;border:1px dashed rgba(46,230,214,.35);border-radius:50%;animation:spin 24s linear infinite}
.ring.r2{inset:14%;animation-duration:16s;animation-direction:reverse}
@keyframes spin{to{transform:rotate(360deg)}}

.quotebox{border-left:4px solid var(--pink);background:rgba(255,46,99,.07);border-radius:0 14px 14px 0;padding:1.2em 1.6em;margin-top:2.2em;max-width:76%;text-align:left;font-weight:300;font-size:clamp(12px,1.5vw,19px);color:var(--grey);animation:fadeUp .8s .4s both}
.quotebox b{color:var(--white)}

/* caption + controls */
#caption{position:absolute;left:50%;bottom:9.5%;transform:translateX(-50%);max-width:86%;background:rgba(4,7,14,.82);border:1px solid rgba(46,230,214,.25);border-radius:10px;padding:.55em 1.3em;font-family:'Anton',sans-serif;font-size:clamp(13px,1.75vw,23px);letter-spacing:.04em;color:#fff;text-transform:uppercase;line-height:1.3;z-index:40;text-shadow:0 2px 8px #000}
#hud{position:absolute;left:0;right:0;bottom:0;height:7.5%;display:flex;align-items:center;gap:14px;padding:0 2.2%;background:linear-gradient(transparent,rgba(3,5,10,.92) 40%);z-index:50}
#hud button{background:rgba(46,230,214,.12);color:var(--cyan);border:1px solid rgba(46,230,214,.4);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:clamp(10px,1.1vw,14px);padding:.35em 1em;cursor:pointer}
#hud button:hover{background:rgba(46,230,214,.25)}
#pbar{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;cursor:pointer}
#pfill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--pink));border-radius:99px;transition:width .3s linear}
#scount{font-family:'JetBrains Mono',monospace;color:var(--grey);font-size:clamp(10px,1.1vw,14px);min-width:64px;text-align:right}
#brandtag{position:absolute;top:3.5%;left:3%;font-family:'JetBrains Mono',monospace;font-size:clamp(9px,1vw,13px);letter-spacing:.3em;color:var(--cyan);opacity:.8;z-index:40}
#brandtag b{color:var(--pink)}

/* start overlay */
#gate{position:absolute;inset:0;z-index:100;background:radial-gradient(100% 120% at 50% 20%,#101a30,#05070f);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 8%}
#gate .k{font-family:'JetBrains Mono',monospace;letter-spacing:.4em;color:var(--cyan);font-size:clamp(10px,1.2vw,15px);margin-bottom:1.6em}
#gate h1{font-family:'Anton';font-size:clamp(34px,6vw,82px);text-transform:uppercase;line-height:1.05}
#gate h1 span{color:var(--cyan);text-shadow:0 0 40px rgba(46,230,214,.6)}
#gate p{font-weight:300;color:var(--grey);margin-top:1.2em;font-size:clamp(12px,1.5vw,19px)}
#playbtn{margin-top:2.6em;width:clamp(74px,9vw,120px);height:clamp(74px,9vw,120px);border-radius:50%;border:2px solid var(--cyan);background:rgba(46,230,214,.1);color:var(--cyan);font-size:clamp(26px,3.4vw,44px);cursor:pointer;box-shadow:0 0 60px rgba(46,230,214,.35);animation:pulse 2.4s infinite;display:flex;align-items:center;justify-content:center}
#playbtn:hover{background:rgba(46,230,214,.28)}
#endcard .sm{font-family:'JetBrains Mono',monospace;color:var(--gold);letter-spacing:.2em;font-size:clamp(10px,1.2vw,15px);margin-top:2.4em}
.paused .scene *, .paused .orb{animation-play-state:paused !important}
</style>
</head>

const scenesEl=document.getElementById('scenes'),cap=document.getElementById('caption'),
 hud=document.getElementById('hud'),pfill=document.getElementById('pfill'),
 scount=document.getElementById('scount'),gate=document.getElementById('gate'),
 stage=document.getElementById('stage');
SCENES.forEach((s,i)=>{const d=document.createElement('div');d.className='scene';d.id='sc'+i;d.innerHTML=s.html;scenesEl.appendChild(d);});
const audio=new Audio();audio.preload='auto';
let idx=-1,playing=false,fallbackT=null;

function show(i){
  document.querySelectorAll('.scene').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('sc'+i);
  el.classList.add('active');
  // re-trigger animations
  el.querySelectorAll('*').forEach(n=>{const a=getComputedStyle(n).animationName;if(a&&a!=='none'){n.style.animation='none';void n.offsetWidth;n.style.animation='';}});
  el.querySelectorAll('.bar i').forEach(b=>{b.style.width='0';setTimeout(()=>b.style.width=b.dataset.w+'%',150);});
  cap.textContent=SCENES[i].cap;
  scount.textContent=(i+1)+' / '+SCENES.length;
}
function playScene(i){
  if(i>=SCENES.length){finish();return;}
  idx=i;show(i);
  clearTimeout(fallbackT);
  audio.src=SCENES[i].aud;
  audio.volume=1;
  audio.play().catch(()=>{fallbackT=setTimeout(()=>{if(playing)playScene(idx+1);},9000);});
  if(i+1<SCENES.length){const pre=new Audio();pre.preload='auto';pre.src=SCENES[i+1].aud;}
}
audio.addEventListener('ended',()=>{if(playing)fallbackT=setTimeout(()=>playScene(idx+1),1600);});
audio.addEventListener('error',()=>{if(playing)fallbackT=setTimeout(()=>playScene(idx+1),9000);});
audio.addEventListener('timeupdate',()=>{
  const d=audio.duration||9,f=Math.min(audio.currentTime/d,1);
  pfill.style.width=(((idx+f)/SCENES.length)*100)+'%';
});
function start(){gate.style.display='none';cap.style.display='block';hud.style.display='flex';playing=true;playScene(0);}
function finish(){playing=false;document.getElementById('btn-pp').textContent='REPLAY';pfill.style.width='100%';}
document.getElementById('playbtn').onclick=start;
document.getElementById('btn-pp').onclick=function(){
  if(idx>=SCENES.length-1&&audio.ended){this.textContent='PAUSE';playing=true;playScene(0);return;}
  if(playing){playing=false;audio.pause();clearTimeout(fallbackT);stage.classList.add('paused');this.textContent='PLAY';}
  else{playing=true;stage.classList.remove('paused');this.textContent='PAUSE';audio.play().catch(()=>playScene(idx));}
};
document.getElementById('btn-rs').onclick=()=>{playing=true;stage.classList.remove('paused');document.getElementById('btn-pp').textContent='PAUSE';playScene(0);};
document.getElementById('btn-skip').onclick=()=>{if(idx<SCENES.length-1){clearTimeout(fallbackT);playScene(idx+1);}};
document.getElementById('pbar').onclick=e=>{
  const r=e.currentTarget.getBoundingClientRect();
  const t=Math.floor(((e.clientX-r.left)/r.width)*SCENES.length);
  clearTimeout(fallbackT);playing=true;stage.classList.remove('paused');
  document.getElementById('btn-pp').textContent='PAUSE';playScene(Math.max(0,Math.min(t,SCENES.length-1)));
};
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();if(gate.style.display!=='none')start();else document.getElementById('btn-pp').click();}
  if(e.code==='ArrowRight')document.getElementById('btn-skip').click();
});
</script>
