        // Core Functions
        function renderBriefing(lang) {
            const grid = document.getElementById('briefingGrid');
            grid.innerHTML = '';
            briefingData[lang].forEach((box, i) => {
                let itemsHTML = box.items.map(item => `<li>${item}</li>`).join('');
                grid.innerHTML += `
                    <div class="bg-white p-5 rounded-xl border border-slate-100 shadow-sm lang-transition">
                        <h3 class="font-bold text-indigo-700 mb-3 text-lg border-b pb-2">${box.title}</h3>
                        <ul class="list-disc pl-5 space-y-2 text-sm text-slate-700">
                            ${itemsHTML}
                        </ul>
                    </div>
                `;
            });
        }

        function renderArticles(lang) {
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '';
            articles.forEach(art => {
                const data = art[lang];
                const specialClass = art.classList.includes('is-special') ? 'border-red-200 ring-1 ring-red-100' : 'border-slate-200';
                const tagBg = data.tagColor === 'red' ? 'bg-red-50 text-red-600' : 
                              data.tagColor === 'blue' ? 'bg-blue-50 text-blue-600' :
                              data.tagColor === 'emerald' ? 'bg-emerald-50 text-emerald-600' : 'bg-purple-50 text-purple-600';
                
                let specialLabel = '';
                let imgFilter = '';
                if(art.classList.includes('is-special')){
                    imgFilter = 'grayscale hover:grayscale-0 transition duration-500';
                    specialLabel = `<div class="absolute top-3 right-3 bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider shadow-md">Special</div>`;
                }

                grid.innerHTML += `
                    <article class="bg-white rounded-2xl shadow-sm border ${specialClass} overflow-hidden hover:shadow-lg transition cursor-pointer blog-card ${art.classList}" onclick="openModal(${art.id})">
                        <div class="relative">
                            <img src="${art.img}" class="w-full h-48 object-cover ${imgFilter}">
                            ${specialLabel}
                        </div>
                        <div class="p-6">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-xs font-semibold px-2 py-1 rounded ${tagBg}">${data.tag}</span>
                            </div>
                            <h2 class="text-xl font-bold text-slate-900 mb-2">${data.title}</h2>
                            <p class="text-slate-600 text-sm line-clamp-3">${data.desc}</p>
                        </div>
                    </article>
                `;
            });
            
            // Re-apply current filter if any
            const activeFilter = document.querySelector('.filter-btn.active');
            if(activeFilter) {
                const cat = activeFilter.id.replace('filter-', '');
                filterCategory(cat === 'all' ? 'all' : cat); // basic mapping
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const ui = uiTranslations[lang];
            
            // Update UI Texts
            document.getElementById('ui-nav-main').innerText = ui.navMain;
            document.getElementById('ui-nav-sub').innerText = ui.navSub;
            document.getElementById('ui-briefing-title').innerText = ui.briefingTitle;
            document.getElementById('ui-live-status').innerText = ui.liveUpdated;
            document.getElementById('ui-video-title-text').innerText = ui.videoTitle;
            document.getElementById('ui-featured-title').innerText = ui.featuredTitle;
            document.getElementById('filter-all').innerText = ui.filterAll;
            document.getElementById('filter-geo').innerText = ui.filterGeo;
            document.getElementById('filter-eec').innerText = ui.filterEec;
            document.getElementById('ui-footer').innerText = ui.footer;

            // Render Dynamic Data
            renderBriefing(lang);
            renderArticles(lang);

            // If modal is open, update its content too
            if(currentlyOpenArticleId !== null) {
                openModal(currentlyOpenArticleId, true);
            }
        }

        // --- Interaction Logic ---
        const modal = document.getElementById('articleModal');
        const modalWrapper = document.getElementById('modalContentWrapper');
        
        function openModal(id, isLangSwitch = false) {
            currentlyOpenArticleId = id;
            const art = articles.find(a => a.id === id);
            const data = art[currentLang];
            const tagBg = data.tagColor === 'red' ? 'bg-red-50 text-red-600' : 
                          data.tagColor === 'blue' ? 'bg-blue-50 text-blue-600' :
                          data.tagColor === 'emerald' ? 'bg-emerald-50 text-emerald-600' : 'bg-purple-50 text-purple-600';

            document.getElementById('modalTitle').innerHTML = data.title;
            document.getElementById('modalImg').src = art.img;
            document.getElementById('modalTags').innerHTML = `<span class="text-xs font-semibold px-3 py-1 rounded-full ${tagBg}">${data.tag}</span>`;
            document.getElementById('modalText').innerHTML = data.content;
            
            if(!isLangSwitch) {
                modal.classList.remove('hidden');
                document.body.classList.add('modal-open');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalWrapper.classList.remove('scale-95');
                    modalWrapper.classList.add('scale-100');
                }, 10);
            }
        }

        function closeModal() {
            currentlyOpenArticleId = null;
            modal.classList.add('opacity-0');
            modalWrapper.classList.remove('scale-100');
            modalWrapper.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.classList.remove('modal-open');
            }, 300);
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        function filterCategory(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-white', 'text-slate-600');
                btn.classList.remove('active');
            });
            // basic ID mapping mapping
            let mapId = category === 'geopolitics' ? 'filter-geo' : category === 'eec' ? 'filter-eec' : 'filter-all';
            const targetBtn = document.getElementById(mapId);
            if(targetBtn) {
                targetBtn.classList.remove('bg-white', 'text-slate-600');
                targetBtn.classList.add('bg-blue-600', 'text-white', 'active');
            }

            const cards = document.querySelectorAll('.blog-card');
            cards.forEach(card => {
                if (category === 'all' || card.classList.contains(category)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Initialize App
        changeLanguage('th');
    </script>
