                    <p className="text-xs text-eco-slate font-light leading-relaxed">
                      {t.hsrMainDesc}
                    </p>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-2">
                      <div className="bg-amber-50/60 p-3.5 rounded-xl border border-amber-200 space-y-1">
                        <span className="text-xs font-mono font-bold text-amber-900 block">{t.hsrOpt1Title}</span>
                        <p className="text-[11px] text-eco-slate font-light leading-relaxed">
                          {t.hsrOpt1Desc}
                        </p>
                      </div>

                      <div className="bg-emerald-50/60 p-3.5 rounded-xl border border-emerald-200 space-y-1">
                        <span className="text-xs font-mono font-bold text-emerald-900 block">{t.hsrOpt2Title}</span>
                        <p className="text-[11px] text-eco-slate font-light leading-relaxed">
                          {t.hsrOpt2Desc}
                        </p>
                      </div>
                    </div>
                  </div>

                  <div className="md:col-span-5 h-64 rounded-xl overflow-hidden border border-eco-border relative">
                    <SafeImage src="https://images.unsplash.com/photo-1532105956626-9569c03602f6?q=80&w=800&auto=format&fit=crop" alt="High Speed Rail Thailand" className="w-full h-full" />
                    <div className="absolute inset-0 bg-gradient-to-t from-eco-header/70 via-transparent to-transparent"></div>
                    <div className="absolute bottom-3 left-3 text-white text-xs font-mono font-medium">
                      High Speed Rail 3 Airports Line
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                  <div className="bg-white p-5 rounded-2xl border border-eco-border eco-card-shadow space-y-2">
                    <span className="text-2xl">👔</span>
                    <h4 className="font-serif font-bold text-eco-header text-sm">{t.hsrSub1Title}</h4>
                    <p className="text-xs text-eco-slate font-light leading-relaxed">{t.hsrSub1Desc}</p>
                  </div>

                  <div className="bg-white p-5 rounded-2xl border border-eco-border eco-card-shadow space-y-2">
                    <span className="text-2xl">📍</span>
                    <h4 className="font-serif font-bold text-eco-header text-sm">{t.hsrSub2Title}</h4>
                    <p className="text-xs text-eco-slate font-light leading-relaxed">{t.hsrSub2Desc}</p>
                  </div>

                  <div className="bg-white p-5 rounded-2xl border border-eco-border eco-card-shadow space-y-2">
                    <span className="text-2xl">🔍</span>
                    <h4 className="font-serif font-bold text-eco-header text-sm">{t.hsrSub3Title}</h4>
                    <p className="text-xs text-eco-slate font-light leading-relaxed">{t.hsrSub3Desc}</p>
                  </div>
                </div>
              </div>
            )}

            {}
            {activeTab === 'ppp' && (
              <div className="space-y-8">
                <div className="border-b border-eco-border pb-4">
                  <div className="inline-block bg-emerald-100 text-emerald-800 text-xs font-mono font-bold px-3 py-1 rounded-md mb-2">
                    {t.pppBadge}
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-eco-header">{t.pppTitle}</h2>
                  <p className="text-xs text-eco-slate mt-1">{t.pppSub}</p>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                  {/* Left List */}
                  <div className="lg:col-span-5 space-y-2 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                    {ppp10Systems.map((sys) => (
                      <button
                        key={sys.id}
                        onClick={() => setSelectedSys(sys.id)}
                        className={`w-full text-left p-3.5 rounded-xl text-xs font-semibold flex items-center justify-between transition-all duration-300 border ${
                          selectedSys === sys.id
                            ? 'bg-eco-header text-white border-eco-header shadow-md'
                            : 'bg-white border-eco-border hover:border-eco-primary text-eco-darkText'
                        }`}
                      >
                        <span className="flex items-center space-x-2 truncate">
                          <span className="font-mono text-eco-primary font-bold">#{sys.id}</span>
                          <span className="truncate">{sys.name[lang]}</span>
                        </span>
                        <span className="text-[10px] opacity-75 font-mono shrink-0">{t.pppBotTag}</span>
                      </button>
                    ))}
                  </div>

                  {/* Right Detail Card */}
                  <div className="lg:col-span-7 bg-white rounded-2xl border border-eco-border p-6 md:p-8 eco-card-shadow space-y-6 flex flex-col justify-between">
                    <div className="space-y-4">
                      <div className="flex justify-between items-center border-b border-eco-border pb-3">
                        <span className="text-xs font-mono font-bold text-eco-primary uppercase">
                          PPP SYSTEM NODE #{selectedSys}
                        </span>
                        <span className="text-xs bg-eco-light text-eco-primary px-3 py-1 rounded-full font-mono font-bold">
                          {ppp10Systems[selectedSys - 1].status[lang]}
                        </span>
                      </div>

                      <h3 className="text-2xl font-serif font-bold text-eco-header">
                        {ppp10Systems[selectedSys - 1].name[lang]}
                      </h3>

                      <p className="text-sm text-eco-slate font-light leading-relaxed">
                        {ppp10Systems[selectedSys - 1].desc[lang]}
                      </p>

                      <div className="h-44 rounded-xl overflow-hidden border border-eco-border relative">
                        <SafeImage 
                          src={
                            selectedSys === 1 ? "https://images.unsplash.com/photo-1509391365360-2e959784a276?q=80&w=800&auto=format&fit=crop" :
                            selectedSys === 6 ? "https://images.unsplash.com/photo-1581092160607-ee22621dd758?q=80&w=800&auto=format&fit=crop" :
                            selectedSys === 9 ? "https://i.postimg.cc/D2zsXF6K/10system-EECiti.png" :
                            "https://images.unsplash.com/photo-1519999482648-25049ddd37b1?q=80&w=800&auto=format&fit=crop"
                          }
                          alt={ppp10Systems[selectedSys - 1].name[lang]}
                          className="w-full h-full"
                        />
                      </div>

                      <div className="bg-eco-bg p-4 rounded-xl border border-eco-border space-y-2 text-xs">
                        <span className="font-bold text-eco-header font-mono block">{t.pppInvestTitle}</span>
                        <p className="text-eco-slate font-light leading-relaxed">
                          {t.pppInvestDesc}
                        </p>
                      </div>
                    </div>

                    <div className="pt-4 border-t border-eco-border flex justify-between items-center text-xs font-mono text-eco-slate">
                      <span>{t.pppSoundingLabel}</span>
                      <span>{t.pppBidLabel}</span>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {}
            {activeTab === 'visa' && (
              <div className="space-y-8">
                <div className="border-b border-eco-border pb-4">
                  <h2 className="text-2xl font-serif font-bold text-eco-header">{t.visaTitle}</h2>
                  <p className="text-xs text-eco-slate mt-1">{t.visaSub}</p>
                </div>

                <div className="bg-white rounded-2xl border border-eco-border p-6 md:p-8 eco-card-shadow space-y-6">
                  <div className="h-48 rounded-xl overflow-hidden relative border border-eco-border">
                    <SafeImage src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=800&auto=format&fit=crop" alt="EECa Visa Lounge" className="w-full h-full" />
                    <div className="absolute inset-0 bg-gradient-to-t from-eco-header/80 via-eco-header/30 to-transparent flex items-end p-6">
                      <div className="text-white">
                        <span className="text-[10px] font-mono uppercase bg-eco-gold px-2.5 py-1 rounded text-white font-bold">{t.visaHeroTag}</span>
                        <h3 className="text-lg font-serif font-bold mt-1">{t.visaHeroTitle}</h3>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="block text-xs font-bold text-eco-header mb-2 font-mono uppercase">
                        {t.visaLabel1}
                      </label>
                      <select
                        value={userSector}
                        onChange={(e) => setUserSector(e.target.value)}
                        className="w-full bg-eco-bg border border-eco-border rounded-xl py-3 px-4 text-xs font-semibold text-eco-darkText focus:outline-none focus:border-eco-primary"
                      >
                        <option value="airline">{t.visaSectorOpt1}</option>
                        <option value="tech">{t.visaSectorOpt2}</option>
                        <option value="medical">{t.visaSectorOpt3}</option>
                        <option value="general">{t.visaSectorOpt4}</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-eco-header mb-2 font-mono uppercase">
                        {t.visaLabel2}
                      </label>
                      <select
                        value={userRole}
                        onChange={(e) => setUserRole(e.target.value)}
                        className="w-full bg-eco-bg border border-eco-border rounded-xl py-3 px-4 text-xs font-semibold text-eco-darkText focus:outline-none focus:border-eco-primary"
                      >
                        <option value="exec">{t.visaRoleOpt1}</option>
                        <option value="spec">{t.visaRoleOpt2}</option>
                        <option value="resident">{t.visaRoleOpt3}</option>
                      </select>
                    </div>
                  </div>

                  {/* Calculated Output Card */}
                  <div className="bg-eco-header text-white rounded-2xl p-6 border border-eco-border/40 space-y-4">
                    <div className="flex justify-between items-center border-b border-white/20 pb-3">
                      <span className="text-xs font-mono text-eco-light font-bold uppercase">{t.visaResHeader}</span>
                      <span className="text-xs bg-white/20 text-white px-3 py-1 rounded font-mono font-bold">
                        {t.visaResDateBadge}
                      </span>
                    </div>

                    <h3 className="text-xl font-serif font-bold text-eco-light">
                      {calculatedVisa.type}
                    </h3>

                    <div className="space-y-2">
                      <span className="text-xs font-bold text-eco-light uppercase tracking-wider font-mono block">
                        {t.visaPerksLabel}
                      </span>
                      <ul className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-eco-light/90 font-light">
                        {calculatedVisa.perks.map((perk, i) => (
                          <li key={i} className="flex items-center space-x-2">
                            <span className="text-eco-gold font-bold">✓</span>
                            <span>{perk}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {}
            {activeTab === 'matcher' && (
              <div className="space-y-8">
                <div className="border-b border-eco-border pb-4">
                  <h2 className="text-2xl font-serif font-bold text-eco-header">{t.matcherTitle}</h2>
                  <p className="text-xs text-eco-slate mt-1">{t.matcherSub}</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  {/* Quiz Section */}
                  <div className="bg-white rounded-2xl border border-eco-border p-6 eco-card-shadow space-y-5">
                    <span className="text-xs font-mono font-bold text-eco-primary uppercase block">{t.quizSectionTitle}</span>
                    
                    <div className="space-y-4 text-xs">
                      <div>
                        <label className="block font-bold text-eco-header mb-1">{t.quizGoalLabel}</label>
                        <select 
                          value={quizGoal} 
                          onChange={(e) => setQuizGoal(e.target.value)}
                          className="w-full bg-eco-bg border border-eco-border rounded-xl p-2.5 font-semibold text-eco-darkText"
                        >
                          <option value="live">{t.quizGoalOpt1}</option>
                          <option value="work">{t.quizGoalOpt2}</option>
                          <option value="health">{t.quizGoalOpt3}</option>
                          <option value="edu">{t.quizGoalOpt4}</option>
                          <option value="sport">{t.quizGoalOpt5}</option>
                        </select>
                      </div>

                      <div>
                        <label className="block font-bold text-eco-header mb-1">{t.quizVibeLabel}</label>
                        <select 
                          value={quizVibe} 
                          onChange={(e) => setQuizVibe(e.target.value)}
                          className="w-full bg-eco-bg border border-eco-border rounded-xl p-2.5 font-semibold text-eco-darkText"
                        >
                          <option value="nature">{t.quizVibeOpt1}</option>
                          <option value="modern">{t.quizVibeOpt2}</option>
                        </select>
                      </div>
                    </div>

                    <div className="bg-eco-header text-white p-5 rounded-xl border border-eco-border space-y-2">
                      <span className="text-[10px] font-mono text-eco-gold uppercase font-bold">{t.quizResultHeader}</span>
                      <h4 className="font-serif font-bold text-base text-eco-light">{matchedZone.title[lang]}</h4>
                      <p className="text-xs text-eco-light/80 font-light leading-relaxed">{matchedZone.desc[lang]}</p>
                    </div>
                  </div>

                  {/* Poll & Club Registration */}
                  <div className="space-y-6">
                    <div className="bg-white rounded-2xl border border-eco-border p-6 eco-card-shadow space-y-4">
                      <span className="text-xs font-mono font-bold text-eco-primary uppercase block">{t.pollTitle}</span>
                      <p className="text-xs font-bold text-eco-header">{t.pollQuestion}</p>

                      <div className="space-y-2">
                        <button 
                          onClick={() => handleVote('option1')}
                          className={`w-full text-left p-3 rounded-xl border text-xs font-semibold flex justify-between items-center transition-all ${
                            pollVote === 'option1' ? 'bg-eco-header text-white border-eco-header' : 'bg-eco-bg border-eco-border text-eco-darkText hover:border-eco-primary'
                          }`}
                        >
                          <span>{t.pollOpt1}</span>
                          <span className="font-mono text-xs">{pollData.option1} {t.pollVotesSuffix}</span>
                        </button>

                        <button 
                          onClick={() => handleVote('option2')}
                          className={`w-full text-left p-3 rounded-xl border text-xs font-semibold flex justify-between items-center transition-all ${
                            pollVote === 'option2' ? 'bg-eco-header text-white border-eco-header' : 'bg-eco-bg border-eco-border text-eco-darkText hover:border-eco-primary'
                          }`}
                        >
                          <span>{t.pollOpt2}</span>
                          <span className="font-mono text-xs">{pollData.option2} {t.pollVotesSuffix}</span>
                        </button>

                        <button 
                          onClick={() => handleVote('option3')}
                          className={`w-full text-left p-3 rounded-xl border text-xs font-semibold flex justify-between items-center transition-all ${
                            pollVote === 'option3' ? 'bg-eco-header text-white border-eco-header' : 'bg-eco-bg border-eco-border text-eco-darkText hover:border-eco-primary'
                          }`}
                        >
                          <span>{t.pollOpt3}</span>
                          <span className="font-mono text-xs">{pollData.option3} {t.pollVotesSuffix}</span>
                        </button>
                      </div>
                    </div>

                    {/* Registration Club Form */}
                    <div className="bg-white rounded-2xl border border-eco-border p-6 eco-card-shadow space-y-4">
                      <span className="text-xs font-mono font-bold text-eco-primary uppercase block">{t.clubTitle}</span>
                      
                      {!formSubmitted ? (
                        <form onSubmit={handleFormSubmit} className="space-y-3">
                          <input 
                            type="text" 
                            placeholder={t.clubNamePlaceholder} 
                            value={formName}
                            onChange={(e) => setFormName(e.target.value)}
                            className="w-full bg-eco-bg border border-eco-border rounded-xl p-2.5 text-xs text-eco-darkText focus:outline-none focus:border-eco-primary"
                            required
                          />
                          <input 
                            type="email" 
                            placeholder={t.clubEmailPlaceholder} 
                            value={formEmail}
                            onChange={(e) => setFormEmail(e.target.value)}
                            className="w-full bg-eco-bg border border-eco-border rounded-xl p-2.5 text-xs text-eco-darkText focus:outline-none focus:border-eco-primary"
                            required
                          />
                          <button 
                            type="submit" 
                            className="w-full bg-eco-primary hover:bg-eco-header text-white text-xs font-bold py-2.5 rounded-xl transition-all font-mono"
                          >
                            {t.clubSubmitBtn}
                          </button>
                        </form>
                      ) : (
                        <div className="bg-eco-light border border-eco-border p-4 rounded-xl text-center space-y-1">
                          <span className="text-xl">✅</span>
                          <h4 className="font-bold text-xs text-eco-header">{t.clubSuccessTitle}</h4>
                          <p className="text-[11px] text-eco-slate">{t.clubSuccessDesc}</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

          </main>

          {}
          <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 pt-6 border-t border-eco-border text-center text-xs text-eco-slate font-sans">
            <p className="mb-2"><strong>{t.footerTitle}</strong></p>
            <p className="text-[11px] font-light text-eco-slate/80">{t.footerRef}</p>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
