                      <div className="bg-luxury-gold text-white text-xs p-4 rounded-xl font-bold text-center shadow-inner">
                        {t[lang].poll_voted_title}
                      </div>
                      {(() => {
                        const total = pollVotes.highlyOptimistic + pollVotes.moderateWithRisk + pollVotes.criticalConcern;
                        const pctOpt = Math.round((pollVotes.highlyOptimistic / total) * 100);
                        const pctMed = Math.round((pollVotes.moderateWithRisk / total) * 100);
                        const pctCrit = Math.round((pollVotes.criticalConcern / total) * 100);
                        return (
                          <div className="space-y-4 font-sans">
                            <div>
                              <div className="flex justify-between text-xs mb-1.5">
                                <span className="text-luxury-cream font-light">{t[lang].poll_chart_1}</span>
                                <span className="text-white font-bold">{pctOpt}%</span>
                              </div>
                              <div className="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                                <div className="bg-luxury-goldlight h-full rounded-full" style={{ width: `${pctOpt}%` }}></div>
                              </div>
                            </div>
                            <div>
                              <div className="flex justify-between text-xs mb-1.5">
                                <span className="text-luxury-cream font-light">{t[lang].poll_chart_2}</span>
                                <span className="text-white font-bold">{pctMed}%</span>
                              </div>
                              <div className="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                                <div className="bg-[#60A5FA] h-full rounded-full" style={{ width: `${pctMed}%` }}></div>
                              </div>
                            </div>
                            <div>
                              <div className="flex justify-between text-xs mb-1.5">
                                <span className="text-luxury-cream font-light">{t[lang].poll_chart_3}</span>
                                <span className="text-white font-bold">{pctCrit}%</span>
                              </div>
                              <div className="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                                <div className="bg-luxury-stone h-full rounded-full" style={{ width: `${pctCrit}%` }}></div>
                              </div>
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>

                {/* PRO Investor Resource & Inquiry Portal (Replaces Mock Comments) */}
                <div className="bg-luxury-navy text-white border border-luxury-navy rounded-[2rem] p-8 dark-page-shadow flex flex-col justify-between space-y-5 font-sans relative overflow-hidden">
                  <div className="absolute -top-20 -left-20 w-48 h-48 bg-luxury-gold opacity-20 rounded-full blur-3xl pointer-events-none"></div>
                  
                  <div className="relative z-10">
                    <span className="text-[10px] text-luxury-goldlight font-bold uppercase tracking-widest mb-2 block">{t[lang].club_title}</span>
                    <h4 className="font-serif text-lg font-medium mb-4 leading-relaxed">{t[lang].club_subtitle}</h4>
                    
                    {!inquirySubmitted ? (
                      <div className="space-y-5">
                        {/* Official Publications / Download list */}
                        <div className="p-5 bg-white/5 rounded-xl border border-white/10 space-y-3 backdrop-blur-md">
                          <span className="text-[10px] text-luxury-cream font-bold uppercase tracking-widest block font-sans">{t[lang].club_doc_label}</span>
                          <div className="space-y-2.5">
                            <a href="#" onClick={(e) => { e.preventDefault(); triggerModal(lang === 'th' ? "ระบบดาวน์โหลด: สมุดเผยแพร่ผังเมืองและคู่มือวิถีชีวิตน่าอยู่ EECiti 2026.pdf (3.8 MB)" : "Initiating download: EECiti Sustainable Living Guide 2026.pdf (3.8 MB)"); }} className="flex justify-between items-center text-xs text-luxury-goldlight hover:text-white transition-all duration-300 group">
                              <span className="truncate pr-2 font-sans flex items-center"><span className="mr-2 opacity-70 group-hover:opacity-100 transition-opacity">📁</span> {t[lang].club_doc_1}</span>
                              <span className="text-[9px] bg-white/10 px-2 py-1 rounded-sm text-white font-mono">3.8 MB</span>
                            </a>
                            <a href="#" onClick={(e) => { e.preventDefault(); triggerModal(lang === 'th' ? "ระบบดาวน์โหลด: แนวทางเตรียมความพร้อมการขอสิทธิพำนัก EEC Visa.pdf (1.9 MB)" : "Initiating download: EEC Visa Application Pathway.pdf (1.9 MB)"); }} className="flex justify-between items-center text-xs text-luxury-goldlight hover:text-white transition-all duration-300 group">
                              <span className="truncate pr-2 font-sans flex items-center"><span className="mr-2 opacity-70 group-hover:opacity-100 transition-opacity">📁</span> {t[lang].club_doc_2}</span>
                              <span className="text-[9px] bg-white/10 px-2 py-1 rounded-sm text-white font-mono">1.9 MB</span>
                            </a>
                          </div>
                        </div>

                        <form onSubmit={handleInquirySubmit} className="space-y-3 font-sans">
                          <div className="space-y-3">
                            <input 
                              type="text" 
                              placeholder={t[lang].club_form_name} 
                              value={inquiryName}
                              onChange={(e) => setInquiryName(e.target.value)}
                              className="bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-sm text-white placeholder-white/60 focus:border-luxury-goldlight focus:bg-white/20 outline-none w-full font-sans transition-all"
                              required
                            />
                            <input 
                              type="text" 
                              placeholder={t[lang].club_form_country} 
                              value={inquiryCountry}
                              onChange={(e) => setInquiryCountry(e.target.value)}
                              className="bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-sm text-white placeholder-white/60 focus:border-luxury-goldlight focus:bg-white/20 outline-none w-full font-sans transition-all"
                              required
                            />
                            <input 
                              type="email" 
                              placeholder={t[lang].club_form_email} 
                              value={inquiryEmail}
                              onChange={(e) => setInquiryEmail(e.target.value)}
                              className="bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-sm text-white placeholder-white/60 focus:border-luxury-goldlight focus:bg-white/20 outline-none w-full font-sans transition-all"
                              required
                            />
                            <select 
                              value={inquiryCluster}
                              onChange={(e) => setInquiryCluster(e.target.value)}
                              className="bg-white/10 border border-white/20 rounded-lg px-3 py-3 text-sm text-white focus:border-luxury-goldlight focus:bg-white/20 outline-none w-full font-sans transition-all [&>option]:bg-luxury-navy [&>option]:text-white"
                            >
                              <option value="Zone 1">{lang === 'th' ? 'สนใจย่าน CBD (ย่าน 1)' : 'Zone 1: Tech & Corporate CBD'}</option>
                              <option value="Zone 2">{lang === 'th' ? 'สนใจย่าน Precision Med (ย่าน 2)' : 'Zone 2: Precision Medical & Lifecare'}</option>
                              <option value="Zone 3">{lang === 'th' ? 'สนใจย่านการศึกษา (ย่าน 3)' : 'Zone 3: Schools & Academy Zone'}</option>
                              <option value="Zone 5">{lang === 'th' ? 'สนใจย่าน Sport Complex (ย่าน 5)' : 'Zone 5: Active Sports SAT Complex'}</option>
                              <option value="Zone 6">{lang === 'th' ? 'สนใจย่านพักอาศัย Smart Living (ย่าน 6)' : 'Zone 6: Walkable Mixed-use living'}</option>
                            </select>
                          </div>
                          <button type="submit" className="w-full mt-2 py-3 bg-white hover:bg-luxury-goldlight text-luxury-navy font-serif text-xs tracking-widest uppercase rounded-lg transition-all duration-300 flex items-center justify-center space-x-2 font-bold shadow-lg">
                            <span>{t[lang].club_btn_submit}</span>
                          </button>
                        </form>
                      </div>
                    ) : (
                      <div className="space-y-5 py-2 font-sans text-left">
                        <div className="bg-white text-luxury-navy text-xs p-5 rounded-xl space-y-3 shadow-lg">
                          <div className="flex items-center space-x-2 font-bold text-sm">
                            <span className="bg-luxury-gold text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px]">✓</span>
                            <span>{t[lang].club_success_title}</span>
                          </div>
                          <p className="text-luxury-espresso text-xs leading-relaxed font-normal">
                            {lang === 'th' ? (
                              `ยินดีต้อนรับคุณ ${inquiryName} เข้าเป็นส่วนหนึ่งของครอบครัวคนรักเมืองในฝัน! ระบบบันทึกข้อมูลเพื่อเตรียมจัดส่งจดหมายข่าวของ ${inquiryCluster} เรียบร้อย คณะผู้บุกเบิกจะส่งแผนงานจัดทริปสัญจรและข่าวสาร EEC Visa ล่าสุดไปให้ศึกษาเพิ่มเติมทางอีเมล ${inquiryEmail} เป็นประจำครับ`
                            ) : (
                              `Welcome ${inquiryName} to our future-smart town fan circle! We securely logged your interest in ${inquiryCluster}. Our admin team will send seasonal updates, regional walkabout invites, and EEC Visa guides directly to ${inquiryEmail}.`
                            )}
                          </p>
                        </div>
                        
                        {/* Premium Minimalist Silver/Blue Inlaid Member Card */}
                        <div className="p-6 bg-gradient-to-br from-[#0F4C6F] to-luxury-navy rounded-xl border border-white/20 flex flex-col justify-between h-44 relative overflow-hidden shadow-2xl">
                          <div className="absolute top-0 right-0 h-28 w-28 bg-white/10 rounded-full blur-xl"></div>
                          <div className="flex justify-between items-start relative z-10">
                            <div>
                              <span className="text-[9px] text-luxury-goldlight uppercase tracking-widest font-mono block opacity-80">{t[lang].club_card_pioneer}</span>
                              <span className="text-sm text-white font-serif font-medium tracking-wide block mt-1">EECITI GLOBAL CITIZEN CLUB</span>
                            </div>
                            <span className="text-[10px] text-white font-serif italic font-bold opacity-80">EST. 2026</span>
                          </div>
                          <div className="flex justify-between items-end border-t border-white/20 pt-4 relative z-10">
                            <div>
                              <span className="text-[9px] text-luxury-goldlight block uppercase font-mono opacity-80">MEMBER NAME</span>
                              <span className="text-sm text-white font-bold tracking-wide block mt-0.5">{inquiryName}</span>
                            </div>
                            <div className="text-right">
                              <span className="text-[9px] text-luxury-goldlight block uppercase font-mono opacity-80">PASS ID</span>
                              <span className="text-sm text-white font-mono tracking-widest block font-bold mt-0.5">{trackingId}</span>
                            </div>
                          </div>
                        </div>

                        <div className="text-center pt-3">
                          <button 
                            onClick={() => { setInquirySubmitted(false); setInquiryName(''); setInquiryEmail(''); }} 
                            className="text-xs text-luxury-goldlight hover:text-white transition-all duration-300 underline font-light"
                          >
                            {t[lang].club_card_reset}
                          </button>
                        </div>
                      </div>
                    )}
                  </div>

                </div>

              </div>

            </div>

            {/* Footer */}
            <footer className="border-t border-luxury-border/80 mt-24 pt-12 pb-8 text-center md:text-left text-luxury-stone text-xs">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-10 mb-10 text-left">
                <div className="space-y-3">
                  <span className="font-serif text-base text-luxury-espresso font-semibold block font-sans">EECiti Global Hub ({lang === 'th' ? 'กิจกรรมโดยชุมชน' : 'Community Initiative'})</span>
                  <p className="font-light leading-relaxed font-sans text-sm">{t[lang].foot_desc}</p>
                </div>
                <div className="space-y-3">
                  <span className="font-serif text-base text-luxury-espresso font-semibold block font-sans">{lang === 'th' ? 'ความโปร่งใสและอ้างอิงเอกสาร' : 'Transparency & Data Sources'}</span>
                  <p className="font-light leading-relaxed font-sans text-sm">{t[lang].foot_rights}</p>
                </div>
                <div className="space-y-3">
                  <span className="font-serif text-base text-luxury-espresso font-semibold block font-sans">{lang === 'th' ? 'มุ่งหน้าสู่อนาคตสีเขียว' : 'Green Living Mission'}</span>
                  <p className="font-light leading-relaxed font-sans text-sm">{t[lang].foot_green}</p>
                </div>
              </div>
              <div className="flex flex-col sm:flex-row justify-between items-center border-t border-luxury-border/60 pt-8">
                <span className="font-medium font-sans text-sm">© 2026 EECiti Global Hub - Community Campaign. All rights reserved.</span>
                <div className="flex space-x-6 mt-4 sm:mt-0 font-medium font-sans text-sm">
                  <a href="#" className="hover:text-luxury-gold transition-colors">{t[lang].foot_privacy}</a>
                  <a href="#" className="hover:text-luxury-gold transition-colors">{t[lang].foot_terms}</a>
                </div>
              </div>
            </footer>

          </main>

          {/* Premium In-App Notification Modal (Replaces standard window alert) */}
          {modalOpen && (
            <div className="fixed inset-0 bg-luxury-espresso/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity duration-300">
              <div className="bg-luxury-white border-0 p-8 rounded-2xl max-w-sm w-full book-page-shadow relative overflow-hidden text-left shadow-2xl">
                <div className="space-y-5 text-center">
                  <div className="h-14 w-14 bg-luxury-bg rounded-full flex items-center justify-center mx-auto text-luxury-gold text-2xl font-sans shadow-inner">
                    ✓
                  </div>
                  <h4 className="text-luxury-espresso font-serif text-xl font-bold uppercase tracking-wider font-sans">
                    {lang === 'th' ? "ดำเนินการสำเร็จ" : "System Notification"}
                  </h4>
                  <p className="text-luxury-stone text-sm font-light leading-relaxed font-sans px-2">
                    {modalContent}
                  </p>
                  <button 
                    onClick={() => setModalOpen(false)}
                    className="mt-4 w-full py-3 bg-luxury-navy hover:bg-luxury-gold text-white text-xs uppercase tracking-widest font-serif rounded-xl transition-all duration-300 font-sans shadow-md"
                  >
                    {lang === 'th' ? "ตกลง" : "Close"}
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Mounting React Application
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
