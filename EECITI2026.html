                  <div className="p-8 space-y-3 text-left font-sans bg-luxury-navy">
                    <span className="text-[10px] text-luxury-goldlight font-bold uppercase tracking-widest font-mono block">{t[lang].side_spot_tag}</span>
                    <h5 className="font-serif text-lg font-medium">{t[lang].side_spot_title}</h5>
                    <p className="text-luxury-cream text-sm leading-relaxed font-light">
                      {t[lang].side_spot_desc}
                    </p>
                  </div>
                </div>

                {/* Poll Section Full Width */}
                <div className="w-full font-sans">
                  <div className="bg-luxury-navy text-white rounded-[2rem] p-8 dark-page-shadow">
                    <span className="text-[10px] text-luxury-goldlight font-bold uppercase tracking-widest mb-3 block">{t[lang].poll_tag}</span>
                    <h4 className="font-serif text-base font-normal mb-5 leading-relaxed">
                      {t[lang].poll_q}
                    </h4>
                    
                    {!pollVoted ? (
                      <div className="space-y-3">
                        <button onClick={() => handleVote('highlyOptimistic')} className="w-full text-left p-4 rounded-xl bg-white/10 border border-white/20 hover:border-luxury-goldlight transition-all text-xs text-white font-light leading-relaxed font-sans backdrop-blur-sm">
                          {t[lang].poll_opt_1}
                        </button>
                        <button onClick={() => handleVote('moderateWithRisk')} className="w-full text-left p-4 rounded-xl bg-white/10 border border-white/20 hover:border-luxury-goldlight transition-all text-xs text-white font-light leading-relaxed font-sans backdrop-blur-sm">
                          {t[lang].poll_opt_2}
                        </button>
                        <button onClick={() => handleVote('criticalConcern')} className="w-full text-left p-4 rounded-xl bg-white/10 border border-white/20 hover:border-luxury-goldlight transition-all text-xs text-white font-light leading-relaxed font-sans backdrop-blur-sm">
                          {t[lang].poll_opt_3}
                        </button>
                      </div>
                    ) : (
                      <div className="space-y-5 font-sans">
                        <div className="bg-luxury-gold text-white text-xs p-4 rounded-xl font-bold text-center shadow-inner">
                          {t[lang].poll_voted_title}
                        </div>
                        {(() => {
                          const total = pollVotes.highlyOptimistic + pollVotes.moderateWithRisk + pollVotes.criticalConcern;
                          const pctOpt = Math.round((pollVotes.highlyOptimistic / total) * 100);
                          const pctMed = Math.round((pollVotes.moderateWithRisk / total) * 100);
                          const pctCrit = Math.round((pollVotes.criticalConcern / total) * 100);
                          return (
                            <div className="space-y-4 font-sans">
                              <div>
                                <div className="flex justify-between text-xs mb-1.5">
                                  <span className="text-luxury-cream font-light">{t[lang].poll_chart_1}</span>
                                  <span className="text-white font-bold">{pctOpt}%</span>
                                </div>
                                <div className="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                                  <div className="bg-luxury-goldlight h-full rounded-full" style={{ width: `${pctOpt}%` }}></div>
                                </div>
                              </div>
                              <div>
                                <div className="flex justify-between text-xs mb-1.5">
                                  <span className="text-luxury-cream font-light">{t[lang].poll_chart_2}</span>
                                  <span className="text-white font-bold">{pctMed}%</span>
                                </div>
                                <div className="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                                  <div className="bg-[#60A5FA] h-full rounded-full" style={{ width: `${pctMed}%` }}></div>
                                </div>
                              </div>
                              <div>
                                <div className="flex justify-between text-xs mb-1.5">
                                  <span className="text-luxury-cream font-light">{t[lang].poll_chart_3}</span>
                                  <span className="text-white font-bold">{pctCrit}%</span>
                                </div>
                                <div className="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                                  <div className="bg-luxury-stone h-full rounded-full" style={{ width: `${pctCrit}%` }}></div>
                                </div>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    )}
                  </div>
                </div>

                {/* Timeline Roadmap */}
                <div className="bg-luxury-white border border-luxury-border rounded-[2rem] p-8 shadow-md">
                  <h4 className="text-luxury-espresso font-serif text-base font-semibold mb-6 flex items-center font-sans">
                    <span className="text-luxury-gold mr-3 text-xl font-sans">✦</span>
                    {t[lang].side_time_title}
                  </h4>
                  <div className="relative border-l-2 border-luxury-border pl-5 ml-2 space-y-8 text-xs text-left font-sans">
                    <div className="relative">
                      <div className="absolute -left-[27px] mt-1 h-3.5 w-3.5 rounded-full border-2 border-luxury-gold bg-luxury-white"></div>
                      <span className="text-[10px] text-luxury-gold font-bold block font-mono tracking-wider">{t[lang].side_time_1_t}</span>
                      <span className="text-luxury-espresso font-serif font-bold text-sm block mt-1">{t[lang].side_time_1_d.split(':')[0]}</span>
                      <span className="text-luxury-stone block mt-1.5 font-light leading-relaxed font-sans">{t[lang].side_time_1_d.split(':')[1]}</span>
                    </div>
                    <div className="relative">
                      <div className="absolute -left-[27px] mt-1 h-3.5 w-3.5 rounded-full border-2 border-luxury-stone bg-luxury-white"></div>
                      <span className="text-[10px] text-luxury-stone font-bold block font-mono tracking-wider">{t[lang].side_time_2_t}</span>
                      <span className="text-luxury-espresso font-serif font-bold text-sm block mt-1">{t[lang].side_time_2_d.split(':')[0]}</span>
                      <span className="text-luxury-stone block mt-1.5 font-light leading-relaxed font-sans">{t[lang].side_time_2_d.split(':')[1]}</span>
                    </div>
                    <div className="relative">
                      <div className="absolute -left-[27px] mt-1 h-3.5 w-3.5 rounded-full border-2 border-luxury-espresso bg-luxury-white"></div>
                      <span className="text-[10px] text-luxury-espresso font-bold block font-mono tracking-wider">{t[lang].side_time_3_t}</span>
                      <span className="text-luxury-espresso font-serif font-bold text-sm block mt-1">{t[lang].side_time_3_d.split(':')[0]}</span>
                      <span className="text-luxury-stone block mt-1.5 font-light leading-relaxed font-sans">{t[lang].side_time_3_d.split(':')[1]}</span>
                    </div>
                  </div>
                </div>

              </div>

            </div>

            {/* Footer */}
            <footer className="border-t border-luxury-border/80 mt-24 pt-12 pb-8 text-center md:text-left text-luxury-stone text-xs">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-10 mb-10 text-left">
                <div className="space-y-3">
                  <span className="font-serif text-base text-luxury-espresso font-semibold block font-sans">EECiti Global Hub ({lang === 'th' ? 'กิจกรรมโดยชุมชน' : lang === 'zh' ? '社区倡议' : lang === 'ru' ? 'Общественная Инициатива' : 'Community Initiative'})</span>
                  <p className="font-light leading-relaxed font-sans text-sm">{t[lang].foot_desc}</p>
                </div>
                <div className="space-y-3">
                  <span className="font-serif text-base text-luxury-espresso font-semibold block font-sans">{lang === 'th' ? 'ความโปร่งใสและอ้างอิงเอกสาร' : lang === 'zh' ? '透明度与数据来源' : lang === 'ru' ? 'Прозрачность и Источники' : 'Transparency & Data Sources'}</span>
                  <p className="font-light leading-relaxed font-sans text-sm">{t[lang].foot_rights}</p>
                </div>
                <div className="space-y-3">
                  <span className="font-serif text-base text-luxury-espresso font-semibold block font-sans">{lang === 'th' ? 'มุ่งหน้าสู่อนาคตสีเขียว' : lang === 'zh' ? '绿色生活使命' : lang === 'ru' ? 'Миссия Зеленой Жизни' : 'Green Living Mission'}</span>
                  <p className="font-light leading-relaxed font-sans text-sm">{t[lang].foot_green}</p>
                </div>
              </div>
              <div className="flex flex-col sm:flex-row justify-between items-center border-t border-luxury-border/60 pt-8">
                <span className="font-medium font-sans text-sm">© 2026 EECiti Global Hub - Community Campaign. All rights reserved.</span>
                <div className="flex space-x-6 mt-4 sm:mt-0 font-medium font-sans text-sm">
                  <a href="#" className="hover:text-luxury-gold transition-colors">{t[lang].foot_privacy}</a>
                  <a href="#" className="hover:text-luxury-gold transition-colors">{t[lang].foot_terms}</a>
                </div>
              </div>
            </footer>

          </main>

          {/* Premium In-App Notification Modal */}
          {modalOpen && (
            <div className="fixed inset-0 bg-luxury-espresso/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity duration-300">
              <div className="bg-luxury-white border-0 p-8 rounded-2xl max-w-sm w-full book-page-shadow relative overflow-hidden text-left shadow-2xl">
                <div className="space-y-5 text-center">
                  <div className="h-14 w-14 bg-luxury-bg rounded-full flex items-center justify-center mx-auto text-luxury-gold text-2xl font-sans shadow-inner">
                    ✓
                  </div>
                  <h4 className="text-luxury-espresso font-serif text-xl font-bold uppercase tracking-wider font-sans">
                    {lang === 'th' ? "ดำเนินการสำเร็จ" : lang === 'zh' ? "系统通知" : lang === 'ru' ? "Системное уведомление" : "System Notification"}
                  </h4>
                  <p className="text-luxury-stone text-sm font-light leading-relaxed font-sans px-2">
                    {modalContent}
                  </p>
                  <button 
                    onClick={() => setModalOpen(false)}
                    className="mt-4 w-full py-3 bg-luxury-navy hover:bg-luxury-gold text-white text-xs uppercase tracking-widest font-serif rounded-xl transition-all duration-300 font-sans shadow-md"
                  >
                    {lang === 'th' ? "ตกลง" : lang === 'zh' ? "关闭" : lang === 'ru' ? "Закрыть" : "Close"}
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Mounting React Application
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
