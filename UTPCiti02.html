                                  <a href="https://thbho.github.io/EECWarImpact.html" target="_blank" rel="noopener noreferrer" className="w-full max-w-sm bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-5 px-8 rounded-2xl flex items-center justify-center transition-all duration-300 shadow-[0_0_40px_-10px_rgba(59,130,246,0.7)] hover:shadow-[0_0_60px_-15px_rgba(59,130,246,0.9)] transform hover:-translate-y-1 text-lg">{t.impact.simBtn} <ExternalLink className="w-6 h-6 ml-3" /></a>
                                  <p className="text-xs text-blue-300/50 mt-6 uppercase tracking-widest font-semibold">{t.impact.simPwr}</p>
                                </div>
                            </div>
                          </div>
                       </div>
                    </div>
                  )}

                </div>
              </main>

              {/* FOOTER */}
              <footer className="bg-[#0F172A] text-slate-400 py-12 text-center border-t border-slate-800 relative z-20">
                <p className="font-bold text-slate-200 text-lg mb-2">{t.footer.t1}</p>
                <p className="max-w-2xl mx-auto px-4 text-sm font-light">{t.footer.d1}</p>
                <div className="mt-8 flex flex-wrap justify-center gap-4">
                  <span className="px-4 py-1.5 bg-slate-800/50 rounded-full text-xs border border-slate-700">{t.footer.b1}</span><span className="px-4 py-1.5 bg-slate-800/50 rounded-full text-xs border border-slate-700">{t.footer.b2}</span><span className="px-4 py-1.5 bg-slate-800/50 rounded-full text-xs border border-slate-700">{t.footer.b3}</span>
                </div>
              </footer>

              {/* IMAGE LIGHTBOX MODAL */}
              {lightboxImg && (
                <div className="fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 sm:p-8" onClick={() => setLightboxImg(null)}>
                  <button className="absolute top-6 right-6 text-white/70 hover:text-white bg-black/50 hover:bg-black/80 rounded-full p-2 transition-colors focus:outline-none" onClick={() => setLightboxImg(null)}>
                    <X size={32} />
                  </button>
                  <img 
                    src={lightboxImg} 
                    alt="Enlarged" 
                    className="max-w-full max-h-full object-contain rounded-lg shadow-2xl zoom-in" 
                    onClick={(e) => e.stopPropagation()} // Prevent click inside from closing
                  />
                </div>
              )}

            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BlogPage />);
    </script>
</body>
</html>
