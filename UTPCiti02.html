<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Tapao Aviation City & EEC Impact</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Styles for hidden scrollbar & animations */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#F8FAFC] antialiased">
    
    <!-- React App Root -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG Icon Components ---
        const Icon = ({ children, size=24, className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const PlaneTakeoff = (p) => <Icon {...p}><path d="M2 22h20"/><path d="M6.36 17.4 4 17l-2-4 1.1-.55a2 2 0 0 1 1.8 0l.17.1a2 2 0 0 0 1.8 0L8 12l5-5 1.5-1.5a2.12 2.12 0 0 1 3 3l-1.5 1.5L11 15l-.1.17a2 2 0 0 0 0 1.8l.1.17a2 2 0 0 1 0 1.8l-4 2-1-.55a2 2 0 0 1-1.8 0l-.17-.1a2 2 0 0 0-1.8 0z"/></Icon>;
        const Building2 = (p) => <Icon {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></Icon>;
        const ShoppingBag = (p) => <Icon {...p}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></Icon>;
        const Stethoscope = (p) => <Icon {...p}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></Icon>;
        const Flag = (p) => <Icon {...p}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></Icon>;
        const Package = (p) => <Icon {...p}><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></Icon>;
        const CalendarDays = (p) => <Icon {...p}><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></Icon>;
        const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
        const MapPin = (p) => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const ShieldAlert = (p) => <Icon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></Icon>;
        const Target = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;
        const RefreshCw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const HeartPulse = (p) => <Icon {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></Icon>;
        const Leaf = (p) => <Icon {...p}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></Icon>;
        const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></Icon>;
        const ExternalLink = (p) => <Icon {...p}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></Icon>;
        const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
        const Activity = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
        const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const DollarSign = (p) => <Icon {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></Icon>;
        const Train = (p) => <Icon {...p}><rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><path d="m8 19-2 3"/><path d="m18 22-2-3"/><path d="M8 15h0"/><path d="M16 15h0"/></Icon>;
        const Ship = (p) => <Icon {...p}><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1 .6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.76"/><path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/><path d="M12 10v4"/><path d="M12 2v3"/></Icon>;

        // --- API Key & Fetch Logic ---
        const apiKey = ""; 

        const generateImageWithRetry = async (prompt, retries = 5) => {
          const delays = [1000, 2000, 4000, 8000, 16000];
          for (let i = 0; i < retries; i++) {
            try {
              if(!apiKey) throw new Error("API Key is missing (Falling back to default image)");
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{parts: [{ text: "Generate a highly detailed, photorealistic image of: " + prompt }]}],
                  generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                })
              });
              if (!response.ok) throw new Error('API Error');
              const data = await response.json();
              const base64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
              if (base64) return `data:image/png;base64,${base64}`;
              throw new Error('No image in response');
            } catch (err) {
              if (i === retries - 1 || !apiKey) throw new Error("ไม่สามารถสร้างรูปภาพได้ในขณะนี้ (Generation Failed)");
              await new Promise(res => setTimeout(res, delays[i]));
            }
          }
        };

        const BlogPage = () => {
          const [activeTab, setActiveTab] = useState('overview');
          const [genImages, setGenImages] = useState({ medical: null, f1: null, logistics: null });
          const [isGenerating, setIsGenerating] = useState({ medical: false, f1: false, logistics: false });
          const [genErrors, setGenErrors] = useState({ medical: '', f1: '', logistics: '' });

          // --- Fallback Images ---
          const fallbackImages = {
            medical: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?q=80&w=1000&auto=format&fit=crop",
            f1: "https://images.unsplash.com/photo-1532983330958-4b32bbe9aa05?q=80&w=1000&auto=format&fit=crop",
            logistics: "https://images.unsplash.com/photo-1586528116311-ad8ed7c50a11?q=80&w=1000&auto=format&fit=crop"
          };

          useEffect(() => {
            const fetchImage = async (section, prompt) => {
              setIsGenerating(prev => ({ ...prev, [section]: true }));
              try {
                const imgData = await generateImageWithRetry(prompt);
                setGenImages(prev => ({ ...prev, [section]: imgData }));
              } catch (err) {
                setGenErrors(prev => ({ ...prev, [section]: err.message }));
              } finally {
                setIsGenerating(prev => ({ ...prev, [section]: false }));
              }
            };

            if (activeTab === 'medical' && !genImages.medical && !isGenerating.medical && !genErrors.medical) {
                fetchImage('medical', 'Futuristic luxury wellness center interior integrated into an airport, bright modern lighting, indoor plants, zero-transit medical hub, architectural visualization, 8k');
            }
            if (activeTab === 'f1' && !genImages.f1 && !isGenerating.f1 && !genErrors.f1) {
                fetchImage('f1', 'Formula One circuit integrated into a futuristic airport airside, cargo planes in the background, F1 cars racing on track, night race under bright floodlights, photorealistic, 8k');
            }
            if (activeTab === 'logistics' && !genImages.logistics && !isGenerating.logistics && !genErrors.logistics) {
                fetchImage('logistics', 'High-tech air cargo and logistics center at an airport, automated delivery drones, cargo planes, futuristic industrial zone, warm sunset lighting, 8k, photorealistic');
            }
          }, [activeTab]);

          const projectStats = [
            { label: 'Investment', value: '2.9 แสนล้าน', unit: 'บาท (PPP 50 ปี)' },
            { label: 'Total Area', value: '1,040', unit: 'เฮกตาร์ (6,500 ไร่)' },
            { label: 'Passenger Capacity', value: '15.9M', unit: 'คนต่อปี (เฟส 1)' },
            { label: 'Commercial Area', value: '3M', unit: 'ตร.ม. (เมื่อเสร็จสิ้น)' }
          ];

          const tabs = [
            { id: 'overview', name: 'ภาพรวม (Overview)', icon: <PlaneTakeoff size={18} /> },
            { id: 'airport-city', name: 'เมืองการบิน (Airport City)', icon: <Building2 size={18} /> },
            { id: 'medical', name: 'ศูนย์การแพทย์ (Medical Hub)', icon: <Stethoscope size={18} /> },
            { id: 'f1', name: 'ฟอร์มูล่าวัน (Formula One)', icon: <Flag size={18} /> },
            { id: 'logistics', name: 'โลจิสติกส์ (Logistics)', icon: <Package size={18} /> },
            { id: 'impact', name: 'สถานการณ์โลก (Global Impact)', icon: <Globe size={18} /> }
          ];

          const renderBulletPoints = (points, customClass = "text-gray-700") => (
            <ul className={`space-y-3 mt-4 ${customClass}`}>
              {points.map((point, index) => (
                <li key={index} className="flex items-start">
                  <ChevronRight className="w-5 h-5 text-blue-500 mr-2 flex-shrink-0 mt-0.5" />
                  <span className="leading-relaxed">{point}</span>
                </li>
              ))}
            </ul>
          );

          const renderGeneratedImage = (section) => {
            if (isGenerating[section]) {
                return (
                    <div className="w-full h-[350px] bg-gray-100 rounded-3xl border border-gray-200 flex flex-col items-center justify-center text-gray-500 mb-8 animate-pulse shadow-inner">
                        <Loader2 className="w-10 h-10 animate-spin-slow mb-3 text-blue-500" />
                        <p className="text-sm font-medium">AI กำลังประมวลผลภาพ (Generating Visuals)...</p>
                    </div>
                );
            }
            if (genErrors[section]) {
                return (
                    <div className="mb-8 relative group overflow-hidden rounded-3xl border border-gray-200 shadow-md">
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/60 text-white z-10 backdrop-blur-sm">
                            <p className="text-sm font-semibold bg-gray-600 px-4 py-1.5 rounded-full mb-2 shadow-lg">AI Generated / Reference Image</p>
                        </div>
                        <img src={fallbackImages[section]} alt="Fallback" className="w-full h-auto max-h-[450px] object-cover" />
                    </div>
                );
            }
            if (genImages[section]) {
                return (
                    <div className="mb-8 overflow-hidden rounded-3xl shadow-lg border border-gray-100 relative group">
                        <img src={genImages[section]} alt="AI Generated" className="w-full h-auto max-h-[450px] object-cover hover:scale-105 transition-transform duration-700" />
                        <div className="absolute bottom-4 right-4 bg-black/70 text-white text-xs font-medium tracking-wide px-3 py-1.5 rounded-full backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity">
                            AI Generated Visualization
                        </div>
                    </div>
                );
            }
            return null;
          };

          return (
            <div className="min-h-screen font-sans selection:bg-blue-200 selection:text-blue-900 pb-20">
              {/* Header / Hero Section */}
              <header className="relative bg-gradient-to-br from-[#0F172A] via-[#1E3A8A] to-[#312E81] text-white py-24 px-6 sm:px-12 lg:px-24 overflow-hidden">
                <div className="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 rounded-full bg-blue-500/10 blur-3xl pointer-events-none"></div>
                <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-indigo-500/10 blur-3xl pointer-events-none"></div>

                <div className="max-w-6xl mx-auto relative z-10">
                  <div className="flex flex-wrap items-center gap-3 mb-6">
                    <span className="bg-blue-500/20 border border-blue-400/30 text-blue-200 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest backdrop-blur-sm">EEC Mega Project</span>
                    <span className="flex items-center text-blue-200 text-sm font-medium bg-white/5 px-4 py-1 rounded-full"><CalendarDays size={14} className="mr-1.5"/> Phase 1 Master Plan</span>
                  </div>
                  <h1 className="text-4xl sm:text-5xl lg:text-7xl font-extrabold mb-6 leading-tight tracking-tight drop-shadow-lg">
                    รุ่งอรุณแห่งมหานครการบิน
                    <span className="block text-2xl sm:text-3xl lg:text-4xl font-light text-blue-200 mt-4 leading-snug">
                      ศูนย์กลางเศรษฐกิจ นวัตกรรม และการใช้ชีวิต<br className="hidden md:block"/>แห่งใหม่ของเอเชียแปซิฟิก
                    </span>
                  </h1>
                  <p className="text-lg md:text-xl text-blue-100 max-w-3xl mb-12 font-light leading-relaxed opacity-90">
                    การเปลี่ยนผ่านกระบวนทัศน์ จาก <strong>"จุดแวะพักที่เร่งรีบ (Transit Node)"</strong> สู่การเป็น <strong>"จุดหมายปลายทางระดับโลกที่เปิดตลอด 24 ชั่วโมง"</strong> ขับเคลื่อนโดยกลุ่ม UTA Consortium (Bangkok Airways, BTS Group และ Sino-Thai)
                  </p>
                  
                  {/* Stats Grid */}
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mt-8">
                    {projectStats.map((stat, idx) => (
                       <div key={idx} className="bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/10 hover:bg-white/10 transition-colors transform hover:-translate-y-1 duration-300">
                         <div className="text-blue-300 text-[10px] md:text-xs font-bold uppercase tracking-widest mb-2">{stat.label}</div>
                         <div className="text-3xl md:text-4xl font-extrabold text-white mb-1 drop-shadow-md">{stat.value}</div>
                         <div className="text-xs md:text-sm text-blue-200 font-medium">{stat.unit}</div>
                       </div>
                    ))}
                  </div>
                </div>
              </header>

              {/* Main Content & Navigation */}
              <main className="max-w-6xl mx-auto px-4 sm:px-12 lg:px-24 py-12 -mt-10 relative z-20">
                
                {/* Interactive Tabs */}
                <div className="flex overflow-x-auto gap-3 mb-10 pb-4 scrollbar-hide">
                  {tabs.map((tab) => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`flex items-center space-x-2 px-6 py-4 rounded-2xl font-semibold whitespace-nowrap transition-all duration-300 shadow-sm ${
                        activeTab === tab.id 
                          ? 'bg-blue-600 text-white shadow-blue-500/40 transform -translate-y-1 border border-blue-500' 
                          : 'bg-white text-gray-600 hover:text-blue-600 hover:bg-blue-50/50 border border-gray-200 hover:border-blue-200'
                      }`}
                    >
                      {tab.icon}
                      <span className="tracking-wide">{tab.name}</span>
                    </button>
                  ))}
                </div>

                {/* Tab Content Area */}
                <div className="bg-white rounded-[2.5rem] shadow-xl border border-gray-100/50 p-8 md:p-12 min-h-[700px]">
                  
                  {/* ======================================= */}
                  {/* OVERVIEW TAB EXPANDED                     */}
                  {/* ======================================= */}
                  {activeTab === 'overview' && (
                    <div className="animate-fade-in">
                      <div className="flex items-center justify-between mb-8">
                        <h2 className="text-3xl lg:text-4xl font-bold text-gray-900 tracking-tight">ภาพรวมโครงการ (Project Overview)</h2>
                      </div>
                      
                      <div className="mb-12 overflow-hidden rounded-3xl shadow-2xl border border-gray-100 relative group">
                        <img 
                          src="https://i.postimg.cc/90VvcZKj/Screenshot_2568-08-06_at_13.23.57-topaz-sharpen-upscale-1.5x-crop.jpg" 
                          alt="Terminal Overview" 
                          className="w-full h-auto max-h-[500px] object-cover group-hover:scale-105 transition-transform duration-1000"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                        <div className="absolute bottom-8 left-8 text-white max-w-2xl pr-8">
                          <span className="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest mb-3 inline-block">Architecture</span>
                          <h3 className="text-3xl font-bold mb-2">Biophilic Terminal Design</h3>
                          <p className="text-gray-200 leading-relaxed font-light">ออกแบบโดยบริษัท One Works ผสานเอกลักษณ์ชายฝั่งระยองเข้ากับธรรมชาติภายในอาคาร ลดความเครียดจากการเดินทาง และกระตุ้นยอดขายพื้นที่เชิงพาณิชย์</p>
                        </div>
                      </div>

                      {/* 4 Pillars Infographic Grid */}
                      <div className="mb-16">
                        <h3 className="text-2xl font-bold text-gray-900 mb-8 flex items-center">
                          <Target className="w-8 h-8 mr-3 text-blue-600" /> พิมพ์เขียวสู่ความสำเร็จ: 4 เสาหลักแห่งเฟส 1
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          {[
                            { title: "1. The Vanguard", sub: "แนวหน้าแห่งการบินและโลจิสติกส์", desc: "รองรับผู้โดยสาร 15.9 ล้านคน/ปี และสินค้า 1 ล้านตัน/ปี พร้อมระบบ One-ID ไบโอเมตริกซ์", icon: <PlaneTakeoff size={32} className="text-blue-500"/>, bg: "bg-blue-50", border: "border-blue-100" },
                            { title: "2. The Destination", sub: "มหานครการบินตะวันออก", desc: "พื้นที่พาณิชยกรรม 3 ล้าน ตร.ม. มุ่งเป้าหมายเป็น Total Duty-Free และศูนย์ MICE ใหญ่ที่สุด", icon: <ShoppingBag size={32} className="text-pink-500"/>, bg: "bg-pink-50", border: "border-pink-100" },
