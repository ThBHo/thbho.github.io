<style>
:root{

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#04060c;font-family:'Kanit',sans-serif;color:var(--white);overflow:hidden}
#stage-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#04060c}
#stage{position:relative;width:min(100vw,177.78vh);height:min(100vh,56.25vw);background:radial-gradient(120% 140% at 70% -10%, #101a30 0%, var(--bg) 55%, #05070f 100%);overflow:hidden;box-shadow:0 0 120px rgba(46,230,214,.06)}

.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35;pointer-events:none}
.orb.c{width:40%;height:40%;background:var(--cyan);top:-15%;right:-10%;animation:drift 14s ease-in-out infinite alternate}
.orb.p{width:35%;height:35%;background:var(--pink);bottom:-18%;left:-8%;animation:drift 17s ease-in-out infinite alternate-reverse;opacity:.22}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(4%,6%) scale(1.15)}}
.scene{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4% 7% 12%;}
.scene.active{display:flex}
.kicker{font-family:'JetBrains Mono',monospace;letter-spacing:.35em;font-size:clamp(10px,1.3vw,16px);color:var(--cyan);text-transform:uppercase;margin-bottom:1.2em;animation:fadeUp .8s both}

.sub b{color:var(--white);font-weight:600}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}

.chip{background:var(--panel);border:1px solid rgba(46,230,214,.25);border-radius:14px;padding:1.4em 1.6em;min-width:24%;animation:pop .7s both}
.chip:nth-child(2){animation-delay:.25s}.chip:nth-child(3){animation-delay:.5s}
.chip .n{font-family:'JetBrains Mono',monospace;color:var(--pink);font-size:clamp(10px,1vw,13px);letter-spacing:.25em}
.chip h3{font-size:clamp(14px,1.8vw,24px);font-weight:600;margin:.35em 0 .3em;color:var(--cyan)}
.chip p{font-weight:300;font-size:clamp(11px,1.25vw,16px);color:var(--grey);line-height:1.45}

.bar-item{margin-bottom:2em}

.bar-item .lbl .v{font-family:'Anton';font-size:clamp(18px,2.6vw,34px)}
.bar{height:clamp(14px,2vw,24px);background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;width:0;transition:width 2.2s cubic-bezier(.2,.8,.2,1)}

.vs .side ul{list-style:none;font-weight:300;font-size:clamp(11px,1.35vw,17px);color:var(--grey);line-height:1.8}

.eq .t:nth-child(3){animation-delay:.25s}.eq .t:nth-child(5){animation-delay:.5s}
.eq .op{font-family:'Anton';font-size:clamp(22px,3.4vw,46px);color:var(--pink);animation:pop .5s .6s both}

.net{position:relative;width:clamp(180px,26vw,340px);height:clamp(180px,26vw,340px);margin-top:1.6em}
.net .hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18%;height:18%;background:var(--cyan);border-radius:50%;box-shadow:0 0 50px var(--cyan);animation:pulse 2s infinite}
.net .nd{position:absolute;width:7%;height:7%;background:rgba(255,255,255,.75);border-radius:50%;animation:pop .6s both}

.ring.r2{inset:14%;animation-duration:16s;animation-direction:reverse}

#caption{position:absolute;left:50%;bottom:9.5%;transform:translateX(-50%);max-width:86%;background:rgba(4,7,14,.82);border:1px solid rgba(46,230,214,.25);border-radius:10px;padding:.55em 1.3em;font-family:'Kanit',sans-serif;font-weight:600;font-size:clamp(13px,1.7vw,22px);color:#fff;line-height:1.4;z-index:40;text-shadow:0 2px 8px #000}
#hud{position:absolute;left:0;right:0;bottom:0;height:7.5%;display:flex;align-items:center;gap:14px;padding:0 2.2%;background:linear-gradient(transparent,rgba(3,5,10,.92) 40%);z-index:50}

#pbar{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;cursor:pointer}

#scount{font-family:'JetBrains Mono',monospace;color:var(--grey);font-size:clamp(10px,1.1vw,14px);min-width:64px;text-align:right}
#brandtag{position:absolute;top:3.5%;left:3%;font-family:'JetBrains Mono',monospace;font-size:clamp(9px,1vw,13px);letter-spacing:.3em;color:var(--cyan);opacity:.8;z-index:40}

#gate{position:absolute;inset:0;z-index:100;background:radial-gradient(100% 120% at 50% 20%,#101a30,#05070f);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 8%}

#playbtn{margin-top:2.6em;width:clamp(74px,9vw,120px);height:clamp(74px,9vw,120px);border-radius:50%;border:2px solid var(--cyan);background:rgba(46,230,214,.1);color:var(--cyan);font-size:clamp(26px,3.4vw,44px);cursor:pointer;box-shadow:0 0 60px rgba(46,230,214,.35);animation:pulse 2.4s infinite;display:flex;align-items:center;justify-content:center}

#endcard .sm{font-family:'JetBrains Mono',monospace;color:var(--gold);letter-spacing:.2em;font-size:clamp(10px,1.2vw,15px);margin-top:2.4em}
.paused .scene *, .paused .orb{animation-play-state:paused !important}
</style>
</head>

const scenesEl=document.getElementById('scenes'),cap=document.getElementById('caption'),
 hud=document.getElementById('hud'),pfill=document.getElementById('pfill'),
 scount=document.getElementById('scount'),gate=document.getElementById('gate'),
 stage=document.getElementById('stage');
SCENES.forEach((s,i)=>{const d=document.createElement('div');d.className='scene';d.id='sc'+i;d.innerHTML=s.html;scenesEl.appendChild(d);});
const audio=new Audio();audio.preload='auto';
let idx=-1,playing=false,fallbackT=null;

function show(i){
  document.querySelectorAll('.scene').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('sc'+i);
  el.classList.add('active');
  el.querySelectorAll('*').forEach(n=>{const a=getComputedStyle(n).animationName;if(a&&a!=='none'){n.style.animation='none';void n.offsetWidth;n.style.animation='';}});
  el.querySelectorAll('.bar i').forEach(b=>{b.style.width='0';setTimeout(()=>b.style.width=b.dataset.w+'%',150);});
  cap.textContent=SCENES[i].cap;
  scount.textContent=(i+1)+' / '+SCENES.length;
}
function playScene(i){
  if(i>=SCENES.length){finish();return;}
  idx=i;show(i);
  clearTimeout(fallbackT);
  audio.src=SCENES[i].aud;
  audio.play().catch(()=>{fallbackT=setTimeout(()=>{if(playing)playScene(idx+1);},11000);});
  if(i+1<SCENES.length){const pre=new Audio();pre.preload='auto';pre.src=SCENES[i+1].aud;}
}
audio.addEventListener('ended',()=>{if(playing)fallbackT=setTimeout(()=>playScene(idx+1),1400);});
audio.addEventListener('error',()=>{if(playing)fallbackT=setTimeout(()=>playScene(idx+1),11000);});
audio.addEventListener('timeupdate',()=>{
  const d=audio.duration||11,f=Math.min(audio.currentTime/d,1);
  pfill.style.width=(((idx+f)/SCENES.length)*100)+'%';
});
function start(){gate.style.display='none';cap.style.display='block';hud.style.display='flex';playing=true;playScene(0);}
function finish(){playing=false;document.getElementById('btn-pp').textContent='เล่นซ้ำ';pfill.style.width='100%';}
document.getElementById('playbtn').onclick=start;
document.getElementById('btn-pp').onclick=function(){
  if(idx>=SCENES.length-1&&audio.ended){this.textContent='หยุด';playing=true;playScene(0);return;}
  if(playing){playing=false;audio.pause();clearTimeout(fallbackT);stage.classList.add('paused');this.textContent='เล่น';}
  else{playing=true;stage.classList.remove('paused');this.textContent='หยุด';audio.play().catch(()=>playScene(idx));}
};
document.getElementById('btn-rs').onclick=()=>{playing=true;stage.classList.remove('paused');document.getElementById('btn-pp').textContent='หยุด';playScene(0);};
document.getElementById('btn-skip').onclick=()=>{if(idx<SCENES.length-1){clearTimeout(fallbackT);playScene(idx+1);}};
document.getElementById('pbar').onclick=e=>{
  const r=e.currentTarget.getBoundingClientRect();
  const t=Math.floor(((e.clientX-r.left)/r.width)*SCENES.length);
  clearTimeout(fallbackT);playing=true;stage.classList.remove('paused');
  document.getElementById('btn-pp').textContent='หยุด';playScene(Math.max(0,Math.min(t,SCENES.length-1)));
};
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();if(gate.style.display!=='none')start();else document.getElementById('btn-pp').click();}
  if(e.code==='ArrowRight')document.getElementById('btn-skip').click();
});
</script>
