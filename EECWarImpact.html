                                link: item.link

                      <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                         <div className="flex items-center gap-3 mb-4">
                          <div className="bg-blue-100 text-blue-600 w-10 h-10 flex justify-center items-center rounded-lg"><i className="fa-solid fa-calendar-days text-lg"></i></div>
                          <h3 className="text-lg font-bold text-slate-800">{t.timelineTitle}</h3>
                        </div>
                        <div className="space-y-4">
                          <div className="flex gap-3"><div className="w-2 h-2 mt-1.5 rounded-full bg-rose-500 shrink-0"></div><p className="text-sm text-slate-600">{t.phase1}</p></div>
                          <div className="flex gap-3"><div className="w-2 h-2 mt-1.5 rounded-full bg-amber-500 shrink-0"></div><p className="text-sm text-slate-600">{t.phase2}</p></div>
                          <div className="flex gap-3"><div className="w-2 h-2 mt-1.5 rounded-full bg-emerald-500 shrink-0"></div><p className="text-sm text-slate-600">{t.phase3}</p></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* --- TAB: SOURCES & LIVE --- */}
                <div className={activeTab === 'sources' ? 'block' : 'hidden'}>
                  <div className="space-y-6">
                    {/* Live Video */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                      <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-video text-red-600"></i> {t.liveFeedTitle}</h2>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="w-full aspect-video rounded-lg overflow-hidden border border-slate-200 bg-slate-100 relative shadow-inner">
                          <iframe src="https://www.youtube.com/embed/gCNeDWCI0vo?autoplay=1&mute=1" className="absolute top-0 left-0 w-full h-full border-0" allowFullScreen></iframe>
                        </div>
                        <div className="w-full aspect-video rounded-lg overflow-hidden border border-slate-200 bg-slate-100 relative shadow-inner">
                          <iframe src="https://www.youtube.com/embed/live_stream?channel=UCknLrEdhRCp1aegoMqRaCZg&autoplay=1&mute=1" className="absolute top-0 left-0 w-full h-full border-0" allowFullScreen></iframe>
                        </div>
                      </div>
                    </div>

                    {/* REAL-TIME OSINT */}
                    <div className="bg-slate-900 rounded-xl shadow-lg border border-slate-800 p-6 relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-emerald-400 to-transparent"></div>
                      <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
                        <i className="fa-solid fa-tower-broadcast text-emerald-400 animate-pulse"></i> {t.osintTitle}
                        <span className="ml-2 px-2 py-0.5 bg-rose-600 text-white text-[10px] font-bold rounded uppercase tracking-wider animate-pulse">LIVE</span>
                      </h2>
                      <div className="space-y-3 font-mono text-sm">
                        {liveNews.map((news, i) => (
                          <div key={i} className="flex flex-col sm:flex-row gap-1 sm:gap-4 pb-3 border-b border-slate-800/50 last:border-0 last:pb-0">
                            <span className="text-emerald-400 shrink-0 whitespace-nowrap">[{news.time}]</span>
                            <div className="flex flex-col">
                                {news.link ? (
                                    <a href={news.link} target="_blank" rel="noreferrer" className="text-slate-300 hover:text-white leading-relaxed hover:underline decoration-emerald-500 underline-offset-4 transition-colors">
                                        {news.text}
                                    </a>
                                ) : (
                                    <span className="text-slate-300 leading-relaxed">{news.text}</span>
                                )}
                                {news.source && <span className="text-[10px] text-slate-500 mt-1 uppercase tracking-widest"><i className="fa-solid fa-newspaper mr-1"></i> {news.source}</span>}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Refs */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                      <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-book-open text-indigo-600"></i> {t.refTitle}</h2>
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        {['EEC Office (สกพอ.)', 'Google News Aggregator', 'SCB EIC / World Bank', 'Neutral Live Networks'].map((source, i) => (
                          <div key={i} className="p-4 border border-slate-200 rounded-lg bg-slate-50"><h4 className="font-semibold text-slate-700 text-sm">{source}</h4></div>
                        ))}
                      </div>
                      <p className="text-xs text-slate-400 mt-4 text-center">{t.refNote}</p>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
